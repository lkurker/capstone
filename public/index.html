<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel = "stylesheet" href = "styles.css">
</head>
<body>
    
    <div class = "container">

        <div class = "userInput" id = "userInput"></div>
        <h2 id = "userNotification" style = "grid-column: 5/7; grid-row: 14/15"></h2>

        <div class = "keyPad" id = "keyPad">
            
            <button class = "key">1</button>
            <button class = "key" style = "grid-column: 2/3; grid-row: 1/2">2</button>
            <button class = "key" style = "grid-column: 3/4; grid-row: 1/2">3</button>
            <button class = "key" style = "grid-column: 1/2; grid-row: 2/3">4</button>
            <button class = "key" style = "grid-column: 2/3; grid-row: 2/3">5</button>
            <button class = "key" style = "grid-column: 3/4; grid-row: 2/3">6</button>
            <button class = "key" style = "grid-column: 1/2; grid-row: 3/4">7</button>
            <button class = "key" style = "grid-column: 2/3; grid-row: 3/4">8</button>
            <button class = "key" style = "grid-column: 3/4; grid-row: 3/4">9</button>
            <button class = "key" style = "grid-column: 1/2; grid-row: 4/5">Back</button>
            <button class = "key" style = "grid-column: 2/3; grid-row: 4/5">0</button>
            <button class = "key" style = "grid-column: 3/4; grid-row: 4/5">Enter</button>

             
        


        </div>

        <button onclick = "accessAdmin()" class = "foodItem" style = "grid-column: 2/3; grid-row: 9/10">Admin</button>

    </div>

    <!--Put the script at the bottom of the html pages!-->
    <script src = "index.js"></script>

</body>

</html>
