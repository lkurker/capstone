<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel = "stylesheet" href = "styles.css">

    <style>

        .foodContainer{

            display: contents;

        }

        .foodColumns{

            grid-column: 1/9;
            grid-row: 2/4;
            background-color: gray;
            border-radius: 10px;
            border: 2px solid black;

        }

        .foodCategory{

            display: relative;
            height: 100%;
            width: 33%;
            font-size: 20px;

        }

        .guestNumber{

            font-size: 30px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            position: relative;
            left: 25px;
            width: 80%;
            z-index: 2;

        }

        .foodDisplay{

            position: relative;
            left: 20%;
            font-size: 18px;

        }

    </style>

</head>
<body>
    
    <div class = "container">

        <div class = "foodColumns" id = "foodColumns">

            <button onclick = "changeCategory(this)" class = "foodCategory" id = "entreeCategory">Entrees</button>
            <button onclick = "changeCategory(this)" class = "foodCategory" id = "appetizerCategory">Appetizers</button>
            <button onclick = "changeCategory(this)" class = "foodCategory" id = "saladCategory">Salad/Bowls</button>
            

        </div>

        <!--We will hide buttons from the page depending on which column the user has clicked on-->

        <div class = "foodContainer" id = "entree">

            <button onclick = "addItem('0014')" class = "foodItem">Classic</button>
            <button onclick = "addItem('0015')" class = "foodItem" style = "grid-column: 2/3; grid-row: 4/5;">Wrath</button>
            <button onclick = "addItem('0016')" class = "foodItem" style = "grid-column: 3/4; grid-row: 4/5;">French Breakfast</button>
            <button onclick = "addItem('0017')" class = "foodItem" style = "grid-column: 4/5; grid-row: 4/5;">Angus Khan</button>
            <button onclick = "addItem('0018')" class = "foodItem" style = "grid-column: 1/2; grid-row: 5/6;">Turkey Burger</button>
            <button onclick = "addItem('0019')" class = "foodItem" style = "grid-column: 2/3; grid-row: 5/6;">Black Bean Burger</button>
            <button onclick = "addItem('0020')" class = "foodItem" style = "grid-column: 3/4; grid-row: 5/6;">Cuban</button>
            <button onclick = "addItem('0021')" class = "foodItem" style = "grid-column: 4/5; grid-row: 5/6;">Spicy Cuban</button>
            <button onclick = "addItem('0022')" class = "foodItem" style = "grid-column: 1/2; grid-row: 6/7;">Southern Chicken</button>
            <button onclick = "addItem('0023')" class = "foodItem" style = "grid-column: 2/3; grid-row: 6/7;">Sticky Chicken</button>
            <button onclick = "addItem('0024')" class = "foodItem" style = "grid-column: 3/4; grid-row: 6/7;">Salmon BLT</button>
            <button onclick = "addItem('0025')" class = "foodItem" style = "grid-column: 4/5; grid-row: 6/7;">Mushroom Reuben</button>
            <button onclick = "addItem('0026')" class = "foodItem" style = "grid-column: 1/2; grid-row: 7/8;">Vegan Banh Mi</button>
            <button onclick = "addItem('0027')" class = "foodItem" style = "grid-column: 2/3; grid-row: 7/8;">Pork Banh Mi</button>
            <button onclick = "addItem('0028')" class = "foodItem" style = "grid-column: 3/4; grid-row: 7/8;">Flounder Sandwich</button>

        </div>
        
            
        <div class = "foodContainer" id = "appetizer" style = "display: none;">

            <button onclick = "addItem('0001')" class = "foodItem">Brussel Sprouts</button>
            <button onclick = "addItem('0002')" class = "foodItem" style = "grid-column: 2/3; grid-row: 4/5;">Cheese Curds</button>
            <button onclick = "addItem('0003')" class = "foodItem" style = "grid-column: 3/4; grid-row: 4/5;">Poutine</button>
            <button onclick = "addItem('0004')" class = "foodItem" style = "grid-column: 4/5; grid-row: 4/5;">Chili Shrimp</button>
            <button onclick = "addItem('0005')" class = "foodItem" style = "grid-column: 1/2; grid-row: 5/6;">Edamame</button>
            <button onclick = "addItem('0006')" class = "foodItem" style = "grid-column: 2/3; grid-row: 5/6;">House Seasoned Fries</button>
            <button onclick = "addItem('0007')" class = "foodItem" style = "grid-column: 3/4; grid-row: 5/6;">Buffalo Cauliflower</button>
            <button onclick = "addItem('0008')" class = "foodItem" style = "grid-column: 4/5; grid-row: 5/6;">Pretzel</button>

        </div>

        <div class = "foodContainer" id = "bowl" style = "display: none;">

            
            <button onclick = "addItem('0009')" class = "foodItem">Cobb Salad</button>
            <button onclick = "addItem('0010')" class = "foodItem" style = "grid-column: 2/3; grid-row: 4/5;">Roasted Veggie Salad</button>
            <button onclick = "addItem('0011')" class = "foodItem" style = "grid-column: 3/4; grid-row: 4/5;">Large Simple Salad</button>
            <button onclick = "addItem('0012')" class = "foodItem" style = "grid-column: 4/5; grid-row: 4/5;">Soup (Bowl)</button>
            <button onclick = "addItem('0013')" class = "foodItem" style = "grid-column: 1/2; grid-row: 5/6;">Soup (Cup)</button>
            <button onclick = "addItem('0029')" class = "foodItem" style = "grid-column: 2/3; grid-row: 5/6;">Mojo Pork Bowl</button>
            <button onclick = "addItem('0030')" class = "foodItem" style = "grid-column: 3/4; grid-row: 5/6;">Chicken Adobo</button>
            <button onclick = "addItem('0031')" class = "foodItem" style = "grid-column: 4/5; grid-row: 5/6;">Etouffee</button>
            <button onclick = "addItem('0032')" class = "foodItem" style = "grid-column: 1/2; grid-row: 6/7;">Vegan Bowl</button>

        </div>


        <div class = "order" id = "order"></div>

        <button class = "foodItem" style = " grid-column: 1/2; grid-row: 12/13"><a href = "dining.html">Back</a></button>
        <button onclick = "removeItem()" class = "foodItem" style = "grid-column: 4/5; grid-row: 12/13">Remove Item</button>
        
        <button onclick = "closeTable()" class = "foodItem" style = "grid-column: 4/5; grid-row: 14/15">Close Table</button>
        

    </div>

    <script src = "order.js"></script>

</body>
</html>
